<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원 정보 수정</title>
  <link rel="stylesheet" href="/css/signup.css">
</head>
<body>
  <div class="signup-container">
    <h2>회원 정보 수정</h2>
    <form th:action="@{/editMember}" th:object="${member}" method="post">
  <div class="form-group">
    <label for="email">이메일</label>
    <input type="text" th:field="*{email}" id="email" placeholder="이메일" readonly>
  </div>

  <div class="form-group">
    <label for="name">이름</label>
    <input type="text" th:field="*{name}" id="name" placeholder="이름" required>
    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></div>
  </div>

  <div class="form-group">
    <label for="password">비밀번호</label>
    <input type="password" th:field="*{password}" id="password" placeholder="비밀번호" required>
    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></div>
  </div>

  <div class="form-group">
    <label for="phone">전화번호</label>
    <input type="text" th:field="*{phone}" id="phone" placeholder="전화번호" required>
    <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color:red;"></div>
  </div>


  <button type="submit">수정하기</button>
</form>

  </div>
</body>
</html>
