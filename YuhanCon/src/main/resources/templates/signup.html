<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원가입 페이지</title>
  <link rel="stylesheet" href="/css/signup.css">
</head>
<body>
  <div class="signup-container">
    <h2>회원가입</h2>
    <form th:action="@{/signup}" method="post">
    <form th:action="@{/signup}" th:object="${member}" method="post">
  <div class="form-group">
    <label for="email">이메일</label>
    <input type="text" th:field="*{email}" id="email" placeholder="이메일" required>
    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></div>
  </div>

  <div class="form-group">
    <label for="name">이름</label>
    <input type="text" th:field="*{name}" id="name" placeholder="이름" required>
    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></div>
  </div>

  <div class="form-group">
    <label for="password">비밀번호</label>
    <input type="password" th:field="*{password}" id="password" placeholder="비밀번호" required>
    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></div>
  </div>

  <div class="form-group">
    <label for="phone">전화번호</label>
    <input type="text" th:field="*{phone}" id="phone" placeholder="전화번호" required>
    <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color:red;"></div>
  </div>

  <div th:if="${emailError}" th:text="${emailError}" style="color:red;"></div>

  <button type="submit">가입하기</button>
</form>

  </div>
</body>
</html>
