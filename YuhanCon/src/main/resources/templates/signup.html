<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>회원가입 페이지</title>
</head>
<body>
<h2>회원가입</h2>

<form th:action="@{/signup}" th:object="${member}" method="post">
    <input type="email" th:field="*{email}" placeholder="이메일"><br/>
    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></div>

    <input type="text" th:field="*{name}" placeholder="이름"><br/>
    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></div>

    <input type="password" th:field="*{password}" placeholder="비밀번호"><br/>
    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></div>

    <input type="text" th:field="*{phone}" placeholder="전화번호"><br/>
    <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color:red;"></div>

    <div th:if="${emailError}" th:text="${emailError}" style="color:red;"></div>

    <button type="submit">가입하기</button>
</form>
</body>
</html>
